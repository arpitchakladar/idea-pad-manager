name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify tag matches CMakeLists.txt version
        run: |
          CMAKE_VERSION=$(cmake -S . -B /tmp/cmake-version-check 2>&1 | grep "Project Version:" | sed 's/.*Project Version: //' | tr -d '[:space:]')
          TAG_VERSION="${{ github.ref_name }}"
          TAG_VERSION="${TAG_VERSION#v}"         # strip leading 'v'
          TAG_VERSION="${TAG_VERSION%%-*}"       # strip prerelease suffix (e.g. -beta1)
          echo "CMake version : $CMAKE_VERSION"
          echo "Tag version   : $TAG_VERSION"
          if [ "$CMAKE_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag ${{ github.ref_name }} does not match CMakeLists.txt version ($CMAKE_VERSION). Aborting."
            exit 1
          fi

      - name: Make build script executable
        run: chmod +x ./scripts/build-prod.sh

      - name: Build project
        run: ./scripts/build-prod.sh

      - name: Detect prerelease
        id: prerelease
        run: |
          if [[ "${{ github.ref_name }}" =~ -(alpha|beta|rc)[0-9]*$ ]]; then
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          else
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          draft: false
          prerelease: ${{ steps.prerelease.outputs.is_prerelease }}
          files: ./build/IdeaPadManager
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
